<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#050807">
    <title>RadioX</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icons/icon.svg">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="station" aria-label="RadioX player">
        <header class="topbar">
          <div class="identity">
            <div class="avatar" aria-hidden="true">
              <span>R</span>
            </div>
            <div>
              <div class="brand pixel">RadioX</div>
              <div class="status"><span></span><strong>ON AIR</strong></div>
            </div>
          </div>
          <div class="clock">
            <div id="time">--:--</div>
            <div id="date">loading</div>
          </div>
        </header>

        <div class="hero">
          <canvas id="spectrum" width="980" height="220" aria-hidden="true"></canvas>
          <div class="hero-copy">
            <p class="eyebrow">PERSONAL AI DJ</p>
            <h1 id="heroLine">Monday Night Exhale</h1>
          </div>
        </div>

        <section class="player-panel" aria-label="Current track">
          <div class="track-row">
            <div>
              <p class="label">NOW PLAYING</p>
              <h2 id="trackTitle">Loading...</h2>
              <p id="trackArtist">RadioX is tuning the room</p>
            </div>
            <button class="icon-button primary" id="playButton" type="button" title="Play or pause" aria-label="Play or pause">▶</button>
          </div>

          <div class="progress-wrap">
            <span id="elapsed">0:00</span>
            <input id="progress" type="range" min="0" max="1000" value="0" aria-label="Playback progress">
            <span id="duration">0:00</span>
          </div>

          <div class="transport">
            <button class="icon-button" id="prevButton" type="button" title="Restart" aria-label="Restart">↺</button>
            <button class="icon-button" id="nextButton" type="button" title="Next track" aria-label="Next track">⏭</button>
            <button class="icon-button" id="favButton" type="button" title="Favorite" aria-label="Favorite">♡</button>
            <label class="volume" title="Volume">
              <span>VOL</span>
              <input id="volume" type="range" min="0" max="100" value="76" aria-label="Volume">
            </label>
            <button class="pill-button" id="spotifyButton" type="button">SPOTIFY</button>
          </div>
        </section>

        <section class="chat-panel" aria-label="DJ transcript">
          <div class="panel-head">
            <span class="live-dot"></span>
            <span>RadioX</span>
            <strong>LIVE</strong>
          </div>
          <div id="transcript" class="transcript"></div>
          <form id="contextForm" class="context-form">
            <div class="control-grid">
              <label>
                <span>MOOD</span>
                <select id="mood">
                  <option value="breath">breath</option>
                  <option value="focus">focus</option>
                  <option value="blue">blue</option>
                  <option value="recover">recover</option>
                  <option value="drive">drive</option>
                  <option value="fire">fire</option>
                </select>
              </label>
              <label>
                <span>WEATHER</span>
                <select id="weather">
                  <option value="clear">clear</option>
                  <option value="rain">rain</option>
                  <option value="cloudy">cloudy</option>
                  <option value="windy">windy</option>
                  <option value="hot">hot</option>
                  <option value="cold">cold</option>
                </select>
              </label>
              <label>
                <span>INTENSITY</span>
                <input id="intensity" type="range" min="1" max="5" value="2">
              </label>
            </div>
            <label class="plan-field">
              <span>TODAY</span>
              <textarea id="planText" rows="2"></textarea>
            </label>
            <button class="send-button" type="submit">RETUNE</button>
          </form>
        </section>
      </section>

      <aside class="side" aria-label="Queue and context">
        <section class="console">
          <div class="console-title">
            <span>&gt; radiox start</span>
            <strong id="serverState">LOCAL</strong>
          </div>
          <div class="console-box">
            <p><span></span>taste loaded</p>
            <p><span></span>weather + schedule online</p>
            <p><span></span>spotify bridge optional</p>
          </div>
          <div id="contextReadout" class="readout"></div>
        </section>

        <section class="queue-panel">
          <div class="panel-head">
            <span>QUEUE</span>
            <strong id="queueCount">0 TRACKS</strong>
          </div>
          <ol id="queue" class="queue"></ol>
        </section>

        <section class="taste-panel">
          <p class="label">TASTE MAP</p>
          <div id="tasteTags" class="chips"></div>
        </section>
      </aside>
    </main>

    <div class="modal" id="spotifySetup" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="spotifySetupTitle">
        <div class="modal-head">
          <div>
            <p class="label">REAL PLAYBACK</p>
            <h2 id="spotifySetupTitle">Spotify Connect</h2>
          </div>
          <button class="icon-button" id="spotifySetupClose" type="button" aria-label="Close">×</button>
        </div>
        <label class="setup-field">
          <span>CLIENT ID</span>
          <input id="spotifyClientIdInput" type="text" spellcheck="false" autocomplete="off" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
        </label>
        <label class="setup-field">
          <span>REDIRECT URI</span>
          <input id="spotifyRedirectUriInput" type="text" readonly>
        </label>
        <div class="setup-actions">
          <button class="pill-button" id="spotifySaveButton" type="button">SAVE</button>
          <button class="send-button" id="spotifyLoginButton" type="button">LOGIN</button>
        </div>
      </div>
    </div>

    <script src="/sim-audio.js"></script>
    <script src="/spotify.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
